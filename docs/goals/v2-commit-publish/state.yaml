goal:
  id: v2-commit-publish
  title: "Commit and publish tech-humanizer-skill v2.0.0"
  status: active
  created_at: "2026-05-22"
  agents:
    scout: unknown
    worker: unknown
    judge: unknown

intake:
  original_request: "同意plan，实施plan，commit and publish to new version | report success or block"
  interpreted_outcome: "All v2.0.0 changes committed on a branch, PR created, CI green."
  input_shape: existing_plan
  authority: approved
  proof_type: artifact
  completion_proof: "PR exists on GitHub with all 6 file changes, CI validate.py green."
  likely_misfire: "Committing only some files and missing bucket-quickref.md or docs/."
  existing_plan_facts:
    - "Implementation complete: 5 files modified/created in previous session."
    - "validate.py passes: OK confirmed."
    - "Version bumped to 2.0.0 in SKILL.md."
    - "13 design decisions applied from grill session."

tasks:
  - id: T001
    type: worker
    assignee: Worker
    status: active
    objective: "Stage all changed files, create branch feat/v2-recursive-critic, commit with conventional message, push, and create PR."
    inputs:
      - "SKILL.md (modified)"
      - "references/ai-markers.md (modified)"
      - "references/lexicons/ai-style-lexicon.json (modified)"
      - "references/profile-schema.md (modified)"
      - "references/bucket-quickref.md (new)"
      - "docs/ (new)"
    constraints:
      - "Do not modify any implementation files."
      - "Commit message format: feat: <description>"
      - "Branch: feat/v2-recursive-critic"
      - "validate.py must pass after staging."
    allowed_files:
      - ".git/*"
    verify:
      - "git status shows nothing left to commit"
      - "gh pr view shows PR exists and CI is queued or passing"
    stop_if:
      - "validate.py fails after staging"
      - "git push is rejected"
    receipt: null

  - id: T999
    type: judge
    assignee: Judge
    status: queued
    objective: "Audit that the PR contains all 6 expected file changes and CI is green."
    inputs:
      - "T001 receipt"
      - "gh pr view output"
    expected_output:
      - "complete | not_complete"
      - "PR URL"
      - "CI status"
      - "full_outcome_complete: true | false"
    receipt: null
